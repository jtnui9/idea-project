<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./output.css">
</head>
<body class="bg-white text-slate-800">

  <header class="border-b">
    <div class="mx-auto flex max-w-7xl items-center justify-between px-6 py-5">
      <h1 class="text-xl font-bold">Logo</h1>

      <nav class="hidden gap-8 md:flex">
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Services</a>
        <a href="#">Contact</a>
      </nav>

      <button class="rounded bg-blue-900 px-5 py-2 text-white">
        Contact
      </button>
    </div>
  </header>

  
  <section class="mx-auto grid max-w-7xl items-center gap-12 px-6 py-20 md:grid-cols-2">
    <div>
      <h2 class="mb-6 text-5xl font-bold ">
        Artificial Intelligence
      </h2>

      <p class="mb-8 text-gray-600">
        Modern AI solutions for business automation.
      </p>

      <button class="rounded bg-blue-900 px-6 py-3 text-white">
        Learn More
      </button>
    </div>

    <img
      src=""
      class="rounded-xl shadow-lg"
      alt=""
    />
  </section>

  <section class="bg-gray-50 py-20">
    <div class="mx-auto grid max-w-7xl gap-8 px-6 md:grid-cols-3">

      <div class="rounded-lg bg-white p-8 shadow">
        Feature 1
      </div>

      <div class="rounded-lg bg-white p-8 shadow">
        Feature 2
      </div>

      <div class="rounded-lg bg-blue-900 p-8 text-white">
        Feature 3
      </div>

    </div>
  </section>

  <section class="mx-auto max-w-7xl px-6 py-20">
    <h2 class="mb-12 text-center text-3xl font-bold">
      Our Team
    </h2>

    <div class="grid gap-8 md:grid-cols-4">

      <div>
        <img class="rounded-lg" src="">
        <h3 class="mt-4 ">John Doe</h3>
      </div>

      <div>
        <img class="rounded-lg" src="">
        <h3 class="mt-4 ">Jane Doe</h3>
      </div>

      <div>
        <img class="rounded-lg" src="">
        <h3 class="mt-4 ">Alex</h3>
      </div>

      <div>
        <img class="rounded-lg" src="">
        <h3 class="mt-4 ">Emily</h3>
      </div>

    </div>
  </section>

  <section class="bg-slate-900 py-20 text-white">
    <div class="mx-auto grid max-w-7xl gap-8 px-6 md:grid-cols-2">

      <div class="rounded-lg border border-slate-700 p-8">
        ★★★★★
      </div>

      <div class="rounded-lg border border-slate-700 p-8">
        ★★★★★
      </div>

    </div>
  </section>
 
  <section class="mx-auto max-w-3xl px-6 py-20">
    <form  >

      <input
        class="w-full rounded border p-3"
        placeholder="Name"
      />

      <input
        class="w-full rounded border p-3"
        placeholder="Email"
      />

      <textarea
        class="w-full rounded border p-3"
        rows="5"
      ></textarea>

      <button
        class="rounded bg-blue-900 px-6 py-3 text-white"
      >
        Send
      </button>

    </form>
  </section>

</body>
